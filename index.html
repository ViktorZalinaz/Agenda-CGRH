<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda CGRH</title>

<style>

/* ================= BASE ================= */
body {
    margin: 0;
    background: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center; /* ✅ centrado vertical */
}

/* ================= CONTENEDOR ================= */
#app {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center; /* ✅ centrado real */
}

/* ================= LIBRO ================= */
#libro {
    width: 90%;
    max-width: 900px;
    aspect-ratio: 1.54;
    overflow: hidden;
}

/* ================= IMAGEN ================= */
#pagina img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ================= UI ================= */
#ui {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    transition: opacity 0.3s;
}

button {
    padding: 8px 15px;
    margin: 4px;
    border: none;
    background: #0078D4;
    color: white;
    border-radius: 5px;
}

#info {
    color: white;
    margin-top: 5px;
}

/* oculto */
.oculto {
    opacity: 0;
    pointer-events: none;
}

/* animación */
.fade {
    animation: fadein 0.35s;
}

@keyframes fadein {
    from {opacity:0; transform:translateX(30px);}
    to {opacity:1; transform:translateX(0);}
}

</style>
</head>

<body>

<div id="app">

    <div id="libro">
        <div id="pagina">
            <img id="imgPagina">
        </div>
    </div>

    <div id="ui">
        <button onclick="inicio()">Inicio</button>
        <button onclick="anterior()">◀</button>
        <button onclick="siguiente()">▶</button>
        <button onclick="final()">Final</button>
        <button onclick="pantallaCompleta()">⛶</button>

        <div id="info"></div>
    </div>

</div>

<script>

/* CONFIG */
const total = 116;

/* ESTADO */
let pagina = localStorage.getItem("pagina")
    ? parseInt(localStorage.getItem("pagina"))
    : 1;

let timerUI;
let uiVisible = true;
let interactoTouch = false;

/* FORMATO */
function num(n){
    return n.toString().padStart(2,'0');
}

/* UI */
function ocultarUI(){
    document.getElementById("ui").classList.add("oculto");
    uiVisible = false;
}

function mostrarUI(){

    let ui = document.getElementById("ui");

    ui.classList.remove("oculto");
    uiVisible = true;

    clearTimeout(timerUI);

    timerUI = setTimeout(()=>{
        ocultarUI();
    }, 2500);
}

/* CARGA */
function cargar(){

    let img = document.getElementById("imgPagina");

    img.classList.remove("fade");

    setTimeout(()=>{
        img.src = `pages/${num(pagina)}.png`;
        img.classList.add("fade");
    }, 50);

    document.getElementById("info").innerText =
        `Página ${pagina} de ${total}`;

    localStorage.setItem("pagina", pagina);
}

/* NAVEGACION */
function siguiente(){
    if(pagina < total){
        pagina++;
        cargar();
    }
}

function anterior(){
    if(pagina > 1){
        pagina--;
        cargar();
    }
}

function inicio(){
    pagina = 1;
    cargar();
}

function final(){
    pagina = total;
    cargar();
}

/* TECLADO */
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") siguiente();
    if(e.key==="ArrowLeft") anterior();
});

/* TOUCH */
let startX = 0;
let startY = 0;
let multiTouch = false;

document.addEventListener("touchstart", e=>{

    interactoTouch = true;

    if(e.touches.length > 1){
        multiTouch = true;
        return;
    }

    multiTouch = false;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    ocultarUI();
});

document.addEventListener("touchend", e=>{

    if (multiTouch) return;

    let endX = e.changedTouches[0].clientX;
    let endY = e.changedTouches[0].clientY;

    let diffX = endX - startX;
    let diffY = endY - startY;

    let limite = 100;

    if(Math.abs(diffX) > limite && Math.abs(diffX) > Math.abs(diffY)){
        if(diffX < 0) siguiente();
        else anterior();
    }
});

/* CLICK PC (IMPORTANTE 🔥) */
document.addEventListener("click", ()=>{
    if(!interactoTouch){
        mostrarUI();
    }
    interactoTouch = false;
});

/* FULLSCREEN */
function pantallaCompleta(){

    let elem = document.documentElement;

    if(!document.fullscreenElement){
        elem.requestFullscreen();
        ocultarUI();
    } else {
        document.exitFullscreen();
        mostrarUI();
    }
}

/* SALIR FULLSCREEN DETECTADO */
document.addEventListener("fullscreenchange", ()=>{
    if(!document.fullscreenElement){
        mostrarUI();
    }
});

/* RESIZE */
window.addEventListener("resize", ()=>{
    mostrarUI(); // ✅ evita que desaparezcan en PC
});

/* INIT */
cargar();
mostrarUI();

</script>

</body>
</html>

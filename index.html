<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda CGRH</title>

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ===== CONTENEDOR ===== */
#app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
}

/* ===== LIBRO ===== */
#libro {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 1.54;
    margin: auto;
    overflow: hidden;
    position: relative;
}

#pagina img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== CONTROLES ===== */
#ui {
    position: fixed;
    bottom: 15px;
    width: 100%;
    text-align: center;
    transition: opacity 0.3s;
}

button {
    padding: 8px 15px;
    margin: 4px;
    border: none;
    background: #0078D4;
    color: white;
    border-radius: 5px;
}

#info {
    color: white;
    margin-top: 5px;
}

/* ocultar UI */
.oculto {
    opacity: 0;
    pointer-events: none;
}

/* animación */
.fade {
    animation: fadein 0.35s;
}

@keyframes fadein {
    from {opacity:0; transform:translateX(40px);}
    to {opacity:1; transform:translateX(0);}
}

</style>
</head>

<body>

<div id="app">

    <div id="libro">
        <div id="pagina">
            <img id="imgPagina" src="pages/01.png">
        </div>
    </div>

    <div id="ui">
        <button onclick="inicio()">Inicio</button>
        <button onclick="anterior()">◀</button>
        <button onclick="siguiente()">▶</button>
        <button onclick="final()">Final</button>
        <button onclick="pantallaCompleta()">⛶</button>

        <div id="info"></div>
    </div>

</div>

<script>

/* ======================= */
const total = 12;
/* ======================= */

let pagina = localStorage.getItem("pagina")
    ? parseInt(localStorage.getItem("pagina"))
    : 1;

let timerUI;

/* ======================= */

function num(n){
    return n.toString().padStart(2,'0');
}

/* =======================
   CONTROL UI
======================= */

function ocultarUI(){
    document.getElementById("ui").classList.add("oculto");
}

function mostrarUI(){
    let ui = document.getElementById("ui");
    ui.classList.remove("oculto");

    clearTimeout(timerUI);

    timerUI = setTimeout(()=>{
        ui.classList.add("oculto");
    }, 2000);
}

/* =======================
   CARGAR PAGINA
======================= */

function cargar(){

    let img = document.getElementById("imgPagina");

    img.classList.remove("fade");

    setTimeout(()=>{

        img.src = `pages/${num(pagina)}.png`;
        img.classList.add("fade");

    },50);

    document.getElementById("info").innerText =
        `Página ${pagina} de ${total}`;

    localStorage.setItem("pagina", pagina);
}

/* =======================
   NAVEGACIÓN
======================= */

function siguiente(){
    if(pagina < total){
        pagina++;
        cargar();
    }
}

function anterior(){
    if(pagina > 1){
        pagina--;
        cargar();
    }
}

function inicio(){
    pagina = 1;
    cargar();
}

function final(){
    pagina = total;
    cargar();
}

/* =======================
   TECLADO
======================= */

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") siguiente();
    if(e.key==="ArrowLeft") anterior();
});

/* =======================
   TÁCTIL
======================= */

let startX = 0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    ocultarUI();
});

document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;

    if(endX < startX - 50) siguiente();
    if(endX > startX + 50) anterior();

    mostrarUI();
});

/* =======================
   CLICK MOSTRAR UI
======================= */

document.addEventListener("click", ()=>{
    mostrarUI();
});

/* =======================
   PANTALLA COMPLETA
======================= */

function pantallaCompleta(){

    let elem = document.documentElement;

    if(!document.fullscreenElement){
        elem.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

/* =======================
   ROTACIÓN LIMPIA
======================= */

window.addEventListener("orientationchange", ()=>{
    setTimeout(()=>{ window.scrollTo(0,1); },100);
});

/* ======================= */

cargar();
mostrarUI();

/* ======================= */

</script>

</body>
</html>
